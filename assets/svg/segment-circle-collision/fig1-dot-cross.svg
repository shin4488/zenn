<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="480" viewBox="60 105 500 240" font-family="'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif">
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EA580C"/>
    </marker>
  </defs>
  <rect x="60" y="105" width="500" height="240" fill="#ffffff"/>

  <!-- Bの影(射影)のハイライト -->
  <line x1="150" y1="270" x2="306" y2="270" stroke="#93C5FD" stroke-width="9" stroke-linecap="butt"/>

  <!-- ベクトルA -->
  <line x1="150" y1="270" x2="470" y2="270" stroke="#2563EB" stroke-width="3.5" marker-end="url(#arrowBlue)"/>
  <text x="455" y="298" font-size="19" fill="#2563EB" font-style="italic">A</text>

  <!-- ベクトルB -->
  <line x1="150" y1="270" x2="306" y2="161" stroke="#EA580C" stroke-width="3.5" marker-end="url(#arrowOrange)"/>
  <text x="296" y="148" font-size="19" fill="#EA580C" font-style="italic">B</text>

  <!-- 垂線(破線) -->
  <line x1="306" y1="161" x2="306" y2="270" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 5"/>

  <!-- 直角マーク -->
  <path d="M 294 270 L 294 258 L 306 258" fill="none" stroke="#6B7280" stroke-width="1.5"/>

  <!-- θの弧 -->
  <path d="M 198 270 A 48 48 0 0 0 189.3 242.5" fill="none" stroke="#1F2937" stroke-width="1.8"/>
  <text x="207" y="257" font-size="17" fill="#1F2937" font-style="italic">θ</text>

  <!-- |B|cosθ の寸法線 -->
  <line x1="150" y1="296" x2="306" y2="296" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="150" y1="290" x2="150" y2="302" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="306" y1="290" x2="306" y2="302" stroke="#6B7280" stroke-width="1.5"/>
  <text x="228" y="322" font-size="16" fill="#374151" text-anchor="middle">|B|cosθ(Bの横の長さ)</text>

  <!-- |B|sinθ の寸法線 -->
  <line x1="326" y1="161" x2="326" y2="270" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="320" y1="161" x2="332" y2="161" stroke="#6B7280" stroke-width="1.5"/>
  <line x1="320" y1="270" x2="332" y2="270" stroke="#6B7280" stroke-width="1.5"/>
  <text x="338" y="222" font-size="16" fill="#374151">|B|sinθ(高さ)</text>
</svg>
